<!-- Modal Login -->
<div class="modal fade" id="modL" data-bs-backdrop="static" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-4 text-center">
      <h4 class="fw-bold text-primary mb-4" id="titleL">LOGIN</h4>
      <form onsubmit="event.preventDefault(); doL();">
        <input type="text" id="ui" class="form-control mb-3" placeholder="Username" required>
        <input type="password" id="pi" class="form-control mb-4" placeholder="Password" required>
        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">MASUK KE SISTEM</button>
      </form>
      <button class="btn btn-link btn-sm mt-2 text-muted" onclick="location.reload()">Batal</button>
    </div>
  </div>
</div>

<!-- Modal Tambah User -->
<div class="modal fade" id="modalAddUser" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Tambah Pengguna Baru</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form onsubmit="event.preventDefault(); prosesSimpanUser();">
        <div class="modal-body">
          <div class="mb-3"><label class="form-label small fw-bold">Username</label><input type="text" id="new-user" class="form-control" placeholder="Contoh: dinkes_user" required></div>
          <div class="mb-3"><label class="form-label small fw-bold">Password</label><input type="text" id="new-pass" class="form-control" placeholder="Masukkan password" required></div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Role</label>
            <select id="new-role" class="form-select" required><option value="Responden">Responden</option><option value="Evaluator">Evaluator</option></select>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Nama OPD / Instansi</label>
            <select id="new-opd" class="form-select" required><option value="">-- Memuat Daftar OPD... --</option></select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button type="submit" class="btn btn-primary px-4">SIMPAN</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal Detail Laporan -->
<div class="modal fade" id="modalDetail" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5>DETAIL LAPORAN</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="area-print" style="padding: 40px; background:white;">
        <div class="text-center mb-4"><h4 class="fw-bold">HASIL EVALUASI PEKPPP</h4><p id="det-opd-nama" class="text-uppercase fw-bold text-muted"></p><hr></div>
        <div class="row mb-4 bg-light p-3 rounded border align-items-center">
          <div class="col-md-6 text-center border-end"><h6>INDEKS AKHIR</h6><h1 class="fw-bold text-primary" id="det-total-display">0.000</h1></div>
          <div class="col-md-6 text-center"><h6>KATEGORI</h6><h3 class="fw-bold" id="det-kategori-label">--</h3></div>
        </div>
        <table class="table table-bordered border-dark small"><thead class="table-secondary text-center fw-bold"><tr><th>ASPEK</th><th>INDIKATOR</th><th>BOBOT</th><th>SKOR</th><th>NILAI</th></tr></thead><tbody id="det-tabel-body"></tbody></table>
      </div>
      <div class="modal-footer"><button class="btn btn-danger fw-bold" onclick="cetakPDF()">DOWNLOAD PDF</button></div>
    </div>
  </div>
</div>

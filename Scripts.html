<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
  let sess = {}, grp = {}, cats = [], ans = {}, totQ = 0, step = 0, vData = [], currentDataDetail = [], myChart;
  let mLogin, mDetail, modalAddUser;

  document.addEventListener('DOMContentLoaded', () => {
    mLogin = new bootstrap.Modal(document.getElementById('modL'));
    mDetail = new bootstrap.Modal(document.getElementById('modalDetail'));
    modalAddUser = new bootstrap.Modal(document.getElementById('modalAddUser'));
  });

  function openL(r) { sess.role = r; document.getElementById('titleL').innerText = 'LOGIN ' + r.toUpperCase(); mLogin.show(); }
  
  function doL() {
    const u = document.getElementById('ui').value, p = document.getElementById('pi').value;
    if(!u || !p) return Swal.fire('Error','Lengkapi data login','error');
    Swal.fire({title:'Menghubungkan...', didOpen:()=>Swal.showLoading()});
    
    google.script.run.withSuccessHandler(res => {
      Swal.close();
      if(res.status === "success") { 
        sess = res; mLogin.hide(); 
        document.getElementById('p-land').classList.add('hidden');
        
        if(res.role === "Responden") { 
          document.getElementById('p-resp').classList.remove('hidden'); 
          document.getElementById('opd-name').innerText = res.nama_opd;
          if(res.sudahIsi) {
            document.getElementById('f-cont').innerHTML = `
              <div class="card p-5 text-center shadow-sm border-0">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                <h3 class="fw-bold mt-3">Data Sudah Terkirim</h3>
                <p class="text-muted">OPD Anda telah menyelesaikan pengisian kuesioner PEKPPP.<br>
                Akses pengisian dikunci untuk menjaga validitas data.</p>
                <div class="alert alert-warning d-inline-block">
                  <i class="bi bi-info-circle"></i> Hubungi <b>Evaluator (Bagian Organisasi)</b> jika perlu melakukan perbaikan data.
                </div>
              </div>`;
            document.querySelector('.sticky-top').classList.add('hidden');
          } else {
            initR();
          }
        } else { 
          document.getElementById('p-eval').classList.remove('hidden'); 
          loadStats(); 
        }
      } else Swal.fire('Gagal', res.message, 'error');
    }).prosesLogin(u,p);
  }

  function getKategori(nilai) {
    const n = parseFloat(nilai);
    if (n >= 4.51) return { label: "A (PELAYANAN PRIMA)", color: "#198754" };
    if (n >= 4.01) return { label: "A- (SANGAT BAIK)", color: "#0d6efd" };
    if (n >= 3.51) return { label: "B (BAIK)", color: "#0dcaf0" };
    if (n >= 3.01) return { label: "B- (BAIK DENGAN CATATAN)", color: "#6610f2" };
    if (n >= 2.51) return { label: "C (CUKUP)", color: "#fd7e14" };
    if (n >= 2.01) return { label: "C- (CUKUP DENGAN CATATAN)", color: "#ffc107" };
    if (n >= 1.51) return { label: "D (BURUK)", color: "#dc3545" };
    if (n >= 1.01) return { label: "E (SANGAT BURUK)", color: "#b02a37" };
    return { label: "F (GAGAL)", color: "#6c757d" };
  }

  // --- RESPONDEN ---
  function initR() {
    const namaOPD = document.getElementById('opd-name').innerText;
    google.script.run.withSuccessHandler(status => {
      if (!status.isOpen) {
        // Sembunyikan progress bar
        document.querySelector('.sticky-top').classList.add('hidden');
        document.getElementById('f-cont').innerHTML = `
          <div class="text-center py-5">
            <div class="display-1 mb-3">🔒</div>
            <h3 class="fw-bold text-danger">Periode Pengisian Ditutup</h3>
            <p class="text-muted">${status.pesan}</p>
            ${status.buka ? `<div class="d-flex justify-content-center gap-4 mt-4">
              <div class="card border-0 shadow-sm p-3 text-center" style="min-width:180px">
                <div class="text-success fw-bold small"><i class="bi bi-calendar-check"></i> Dibuka</div>
                <div class="fw-bold">${status.buka}</div>
              </div>
              <div class="card border-0 shadow-sm p-3 text-center" style="min-width:180px">
                <div class="text-danger fw-bold small"><i class="bi bi-calendar-x"></i> Ditutup</div>
                <div class="fw-bold">${status.tutup}</div>
              </div>
            </div>` : ''}
          </div>`;
        return;
      }
      // Tampilkan banner info jika periode aktif
      if (status.tutup) {
        const info = document.getElementById('periode-info');
        info.className = 'alert alert-info border-0 shadow-sm rounded-4 mb-4 d-flex align-items-center';
        info.innerHTML = `<div class="me-3 fs-4">📅</div><div><strong>Batas Pengisian:</strong> Formulir ini akan ditutup pada <strong>${status.tutup}</strong>. Pastikan Anda mengirimkan jawaban sebelum batas waktu tersebut.</div>`;
      }
      // Lanjut muat pertanyaan
      google.script.run.withSuccessHandler(data => {
        totQ = data.length; grp = {}; cats = [];
        data.forEach(r => { if(!grp[r[1]]) { grp[r[1]] = []; cats.push(r[1]); } grp[r[1]].push(r); });
        showS(0);
      }).getPertanyaan();
    }).cekStatusPeriode(namaOPD);
  }
  
  function showS(idx) {
    step = idx; const k = cats[idx], qs = grp[k], cont = document.getElementById('f-cont');
    document.getElementById('k-lab').innerText = k;
    let h = `<div class="p-3 mb-4 bg-primary text-white fw-bold rounded shadow-sm text-center text-uppercase">ASPEK: ${k}</div>`;
    
    qs.forEach(q => {
      const s = ans[q[0]] || {skala:"", link:""};
      let pFormatted = (q[3] || "")
        .replace(/\n/g, '<br>')
        .replace(/\*Penjelasan\*/g, '<div class="mt-0"><strong><i class="bi bi-info-circle"></i> Penjelasan:</strong></div>')
        .replace(/\*Dokumen yang Dibutuhkan\*/g, '<div class="mt-3"><strong><i class="bi bi-folder2-open"></i> Dokumen yang Dibutuhkan:</strong></div>')
        .replace(/\*Kriteria Skala\*/g, '<div class="mt-3"><strong><i class="bi bi-bar-chart"></i> Kriteria Skala:</strong></div>');

      h += `
      <div class="q-card ${s.skala!==""?'filled shadow-sm':''}">
        <h5 class="fw-bold mb-3" style="color:#2c3e50;">${q[2]}</h5>
        <div class="deskripsi-box mb-4 shadow-sm">${pFormatted}</div>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="small fw-bold text-muted">Pilih Skor:</label>
            <select class="form-select border-primary" onchange="savA('${q[0]}',this,'skala')">
              <option value="">-- Pilih Skor --</option>
              ${[0,1,2,3,4,5].map(v=>`<option value="${v}" ${s.skala.toString()===v.toString()?'selected':''}>Skala ${v}</option>`).join('')}
            </select>
          </div>
          <div class="col-md-8">
            <label class="small fw-bold text-muted">Link URL Bukti Dukung (G-Drive & Public):</label>
            <input type="url" class="form-control border-primary" placeholder="Contoh: https://drive.google.com/..." value="${s.link}" oninput="savA('${q[0]}',this,'link')">
            <div class="mt-1" style="font-size: 0.7rem; color: #6c757d;"><i class="bi bi-info-circle"></i> Pastikan link dapat diakses publik.</div>
          </div>
        </div>
      </div>`;
    });
    h += `<div class="d-flex justify-content-between mt-4 pb-5"><button class="btn btn-secondary px-4 fw-bold" onclick="showS(${idx-1})" ${idx===0?'disabled':''}>KEMBALI</button>${idx < cats.length-1 ? `<button class="btn btn-primary px-5 shadow fw-bold" onclick="nextS()">LANJUT</button>` : `<button class="btn btn-success px-5 shadow fw-bold" onclick="finS()">KIRIM JAWABAN</button>`}</div>`;
    cont.innerHTML = h; upP(); window.scrollTo(0,0);
  }
  
  function isV(l) { return l && (l.includes('drive.google.com') || l.includes('docs.google.com')); }
  
  function savA(id, el, t) { if(!ans[id]) ans[id] = {id:id, skala:"", link:""}; ans[id][t] = el.value.trim(); upP(); }
  
  function nextS() { 
    const qs = grp[cats[step]];
    const incomplete = qs.some(q => {
      const a = ans[q[0]];
      if(!a || a.skala === "") return true;
      // Jika skala bukan 0, maka link wajib diisi dan valid
      if(a.skala !== "0" && (!a.link || !isV(a.link))) return true;
      return false;
    });
    
    if(incomplete) return Swal.fire('Belum Lengkap','Mohon isi semua skor dan bukti dukung (kecuali untuk skala 0).','warning');
    
    showS(step+1); 
  }

  function upP() { 
    if(totQ===0) return; 
    let f = Object.values(ans).filter(a => {
      if(a.skala === "") return false;
      if(a.skala === "0") return true; // Skala 0 dianggap valid meski tanpa link
      return a.link && isV(a.link);
    }).length; 
    let p = Math.round((f/totQ)*100); 
    document.getElementById('p-bar').style.width = p+'%'; 
    document.getElementById('p-tex').innerText = p+'%'; 
  }

  function finS() { 
    // Final check for all questions
    const answeredCount = Object.values(ans).filter(a => {
      if(a.skala === "") return false;
      if(a.skala === "0") return true;
      return a.link && isV(a.link);
    }).length;
    if(answeredCount < totQ) return Swal.fire('Belum Selesai',`Anda baru mengisi ${answeredCount} dari ${totQ} indikator. Mohon lengkapi seluruhnya sebelum mengirim.`,'warning');

    Swal.fire({
      title: 'Kirim Jawaban?',
      text: "Data yang sudah dikirim tidak dapat diubah kembali tanpa izin admin.",
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Ya, Kirim Sekarang'
    }).then(result => {
      if(result.isConfirmed) {
        Swal.fire({title:'Mengirim data...', didOpen:()=>Swal.showLoading()}); 
        google.script.run.withSuccessHandler(() => {
          window.top.location.href = 'https://bagorsetdamuarojambi.blogspot.com/';
        }).simpanSemuaJawaban({opd: sess.nama_opd, jawaban: Object.values(ans)});
      }
    });
  }

  // --- EVALUATOR LOGIC ---
  function loadStats() {
    google.script.run.withSuccessHandler(res => {
      document.getElementById('s-tot').innerText = res.total; document.getElementById('s-sud').innerText = res.sudah; document.getElementById('s-bel').innerText = res.total - res.sudah;
      if (myChart) myChart.destroy();
      myChart = new Chart(document.getElementById('chartProgres').getContext('2d'), { type:'doughnut', data:{ labels:['Sudah','Belum'], datasets:[{data:[res.sudah, res.total-res.sudah], backgroundColor:['#198754','#dee2e6']}] }, options:{plugins:{legend:{position:'bottom'}}} });
    }).getStats();
  }

  function initV() { google.script.run.withSuccessHandler(res => { let h = '<option value="">-- Pilih OPD --</option>'; for(let o in res) h += `<option value="${o}">${o}</option>`; document.getElementById('sel-v').innerHTML = h; }).getOPDSudahKirim(); }
  
  function muatV() {
    const o = document.getElementById('sel-v').value; if(!o) return;
    Swal.fire({title:'Memuat data...', didOpen:()=>Swal.showLoading()});
    google.script.run.withSuccessHandler(res => { 
      Swal.close(); vData = res.items; renderVList(o, res.nilaiSKM, res.catatanKomponen);
    }).getJawabanByOPD(o);
  }

  function renderVList(opdName, nilaiSKM, ck) {
    ck = ck || {pt_p:'', pt_r:'', ai_p:'', ai_r:'', pm_p:'', pm_r:'', ep_p:'', ep_r:''};
    document.getElementById('v-det').classList.remove('hidden');
    let h = `
      <div class="card p-3 border-0 shadow-sm mb-3 bg-light border-start border-5 border-warning">
        <div class="row align-items-center">
          <div class="col-md-7">
            <h6 class="fw-bold mb-1 text-uppercase">Dimensi SKM (Manual)</h6>
            <p class="small text-muted mb-0">Masukkan nilai Survei Kepuasan Masyarakat untuk <b>${opdName}</b>.</p>
          </div>
          <div class="col-md-5">
            <div class="input-group">
              <span class="input-group-text bg-warning text-white border-warning fw-bold">NILAI SKM</span>
              <input type="number" id="inp-skm" class="form-control border-warning fw-bold" step="0.001" value="${nilaiSKM || ''}" placeholder="0.000">
            </div>
          </div>
        </div>
      </div>
      <div class="alert alert-info d-flex justify-content-between align-items-center mb-3">
        <span>Memverifikasi Dimensi Tata Kelola: <b>${opdName}</b></span>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-primary fw-bold" onclick="samakanSkorSemua()">
            <i class="bi bi-check-all"></i> Samakan Semua
          </button>
          <button class="btn btn-sm btn-danger fw-bold" onclick="aksiHapus('jawaban', '${opdName}')">
            <i class="bi bi-arrow-counterclockwise"></i> Reset Responden
          </button>
        </div>
      </div>`;
    
    document.getElementById('v-list').innerHTML = h + vData.map((it, i) => `
      <div class="q-card shadow-sm border-start border-5 border-primary">
        <div class="row align-items-center">
          <div class="col-12 mb-3 d-flex justify-content-between align-items-start">
            <div>
              <h6 class="fw-bold mb-1">${it.pertanyaan}</h6>
              <a href="${it.link}" target="_blank" class="btn btn-sm btn-outline-primary"><i class="bi bi-link-45deg"></i> Lihat Bukti Dukung</a>
            </div>
            <button class="btn btn-sm btn-primary fw-bold" onclick="samakanSkorSatu(${i})">
              <i class="bi bi-arrow-right-short"></i> Samakan
            </button>
          </div>
          <div class="col-12 d-flex gap-2 align-items-center">
            <div class="badge-resp"><small class="d-block text-muted">Resp:</small><span class="badge bg-secondary fs-6">${it.skala_responden}</span></div>
            <div class="col-eval-skala">
              <small class="d-block text-muted text-primary fw-bold">Pilih Skala:</small>
              <select id="sel-eval-${i}" class="form-select form-select-sm border-primary" onchange="vData[${i}].skala_evaluator=this.value">
                <option value="">-- Skor --</option>
                ${[0,1,2,3,4,5].map(v=>`<option value="${v}" ${it.skala_evaluator.toString()===v.toString()?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
            <div class="col-eval-catatan">
              <small class="d-block text-muted text-primary fw-bold">Catatan Evaluator:</small>
              <textarea class="form-control form-control-sm border-primary" rows="1" oninput="vData[${i}].catatan=this.value" placeholder="Tulis catatan verifikasi di sini...">${it.catatan||''}</textarea>
            </div>
          </div>
        </div>
      </div>`).join('') + `
      <div class="card p-4 border-0 shadow-sm mt-4 bg-light border-start border-5 border-info">
        <h5 class="fw-bold mb-3 text-info">CATATAN EVALUATOR PER KOMPONEN</h5>
        <div class="table-responsive">
          <table class="table table-bordered table-sm align-middle bg-white">
            <thead class="table-secondary text-center">
              <tr>
                <th width="5%">No</th>
                <th width="25%">Komponen</th>
                <th width="35%">Pengamatan Lapangan</th>
                <th width="35%">Rekomendasi</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="text-center">1</td>
                <td class="fw-bold">PONDASI TEKNIS</td>
                <td><textarea id="ck_pt_p" class="form-control form-control-sm" rows="2">${ck.pt_p}</textarea></td>
                <td><textarea id="ck_pt_r" class="form-control form-control-sm" rows="2">${ck.pt_r}</textarea></td>
              </tr>
              <tr>
                <td class="text-center">2</td>
                <td class="fw-bold">AKSESIBILITAS DAN INKLUSIF</td>
                <td><textarea id="ck_ai_p" class="form-control form-control-sm" rows="2">${ck.ai_p}</textarea></td>
                <td><textarea id="ck_ai_r" class="form-control form-control-sm" rows="2">${ck.ai_r}</textarea></td>
              </tr>
              <tr>
                <td class="text-center">3</td>
                <td class="fw-bold">PELIBATAN MASYARAKAT</td>
                <td><textarea id="ck_pm_p" class="form-control form-control-sm" rows="2">${ck.pm_p}</textarea></td>
                <td><textarea id="ck_pm_r" class="form-control form-control-sm" rows="2">${ck.pm_r}</textarea></td>
              </tr>
              <tr>
                <td class="text-center">4</td>
                <td class="fw-bold">EFEKTIVITAS PEMERINTAHAN</td>
                <td><textarea id="ck_ep_p" class="form-control form-control-sm" rows="2">${ck.ep_p}</textarea></td>
                <td><textarea id="ck_ep_r" class="form-control form-control-sm" rows="2">${ck.ep_r}</textarea></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>`;
  }

  function samakanSkorSatu(idx) {
    vData[idx].skala_evaluator = vData[idx].skala_responden;
    document.getElementById('sel-eval-' + idx).value = vData[idx].skala_responden;
    // Tambahkan feedback visual sedikit
    const card = document.getElementById('sel-eval-' + idx).closest('.q-card');
    card.style.backgroundColor = '#f0fff4';
    setTimeout(() => card.style.backgroundColor = 'white', 500);
  }

  function samakanSkorSemua() {
    vData.forEach((it, i) => { vData[i].skala_evaluator = it.skala_responden; });
    // We need to pass the existing values of SKM and Catatan when re-rendering
    const skmValue = parseFloat(document.getElementById('inp-skm').value) || 0;
    const ck = {
      pt_p: document.getElementById('ck_pt_p').value, pt_r: document.getElementById('ck_pt_r').value,
      ai_p: document.getElementById('ck_ai_p').value, ai_r: document.getElementById('ck_ai_r').value,
      pm_p: document.getElementById('ck_pm_p').value, pm_r: document.getElementById('ck_pm_r').value,
      ep_p: document.getElementById('ck_ep_p').value, ep_r: document.getElementById('ck_ep_r').value
    };
    renderVList(document.getElementById('sel-v').value, skmValue, ck);
    Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Semua skor telah disamakan.', timer: 1000, showConfirmButton: false });
  }

  function kirimV() { 
    const skmValue = parseFloat(document.getElementById('inp-skm').value) || 0;
    const ck = {
      pt_p: document.getElementById('ck_pt_p').value, pt_r: document.getElementById('ck_pt_r').value,
      ai_p: document.getElementById('ck_ai_p').value, ai_r: document.getElementById('ck_ai_r').value,
      pm_p: document.getElementById('ck_pm_p').value, pm_r: document.getElementById('ck_pm_r').value,
      ep_p: document.getElementById('ck_ep_p').value, ep_r: document.getElementById('ck_ep_r').value
    };
    Swal.fire({title:'Menyimpan...', didOpen:()=>Swal.showLoading()}); 
    google.script.run.withSuccessHandler(()=>Swal.fire('Tersimpan','Verifikasi berhasil diperbarui','success'))
      .simpanVerifikasi({opd: document.getElementById('sel-v').value, items: vData, nilaiSKM: skmValue, catatanKomponen: ck}); 
  }

  function loadHasil() {
    google.script.run.withSuccessHandler(res => {
      currentDataDetail = res;
      document.getElementById('h-body').innerHTML = res.map((h, i) => {
        const ippop = parseFloat(h.nilaiIPPOP || 0).toFixed(3);
        const kat = getKategori(ippop);
        return `<tr>
          <td class="fw-bold px-3">${h.opd}</td>
          <td class="text-center small">${parseFloat(h.nilaiTataKelola).toFixed(3)}</td>
          <td class="text-center small">${parseFloat(h.nilaiSKM).toFixed(3)}</td>
          <td class="text-center"><span class="badge bg-primary fs-6">${ippop}</span></td>
          <td class="text-center fw-bold" style="color:${kat.color}">${kat.label.split(' ')[0]}</td>
          <td class="text-center">
            <div class="btn-group">
              <button class="btn btn-sm btn-info text-white fw-bold" onclick="bukaDetail(${i})">Laporan</button>
              <button class="btn btn-sm btn-primary fw-bold" onclick="cetakBeritaAcara(${i})">Berita Acara</button>
              <button class="btn btn-sm btn-outline-danger" onclick="aksiHapus('verifikasi', '${h.opd}')">Hapus</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }).getRekapVerifikasi();
  }

  function loadMasterSoal() { google.script.run.withSuccessHandler(data => { document.getElementById('soal-body').innerHTML = data.map(s => `<tr><td><span class="badge bg-info">${s[1]}</span></td><td>${s[2]}</td><td>${s[4]}</td></tr>`).join(''); }).getPertanyaan(); }
  
  function loadMasterUser() {
    google.script.run.withSuccessHandler(data => {
      document.getElementById('user-body').innerHTML = data.map(u => `
        <tr>
          <td><b>${u[0]}</b></td>
          <td><span class="badge bg-light text-dark">${u[2]}</span></td>
          <td>${u[3]}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-danger" onclick="aksiHapusUser('${u[0]}')">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>`).join('');
    }).getAllUsers();
  }

  function bukaDetail(idx) {
    const d = currentDataDetail[idx];
    const ippop = parseFloat(d.nilaiIPPOP || 0).toFixed(3);
    const kat = getKategori(ippop);
    const r = d.rincian;

    // Populate header fields
    document.getElementById('det-opd-nama').innerText = d.opd;
    document.getElementById('det-ipp-final').innerText = ippop;
    document.getElementById('det-predikat-final').innerText = kat.label;

    // Aspect grouping - multipliers must match Master_Pertanyaan bobot per item / 5
    // We use the bobot field from each item to compute nilai per poin = (bobot/5) * skor
    // The 4 Aspect groups are derived from aspek names in order
    const aspekKeys = [...new Set(r.map(x => x.aspek))];
    const romanNumerals = ['I','II','III','IV','V','VI','VII','VIII'];
    const TDstyle = 'border: 1px solid black; padding: 4px;';
    const TDcenter = TDstyle + ' text-align: center;';

    let html = '';
    let totalTK = 0;
    let globalRowNo = 1;

    aspekKeys.forEach((aspek, aspIdx) => {
      const items = r.filter(x => x.aspek === aspek);
      let aspectSum = 0;

      items.forEach((it, i) => {
        const score = parseFloat(it.skor || 0);
        const nilaiPerPoin = parseFloat(it.nilai || 0);
        aspectSum += nilaiPerPoin;

        html += `<tr>
          ${i === 0 ? `<td rowspan="${items.length}" style="${TDcenter} font-weight:bold; vertical-align:middle;">${romanNumerals[aspIdx]}</td>` : ''}
          ${i === 0 ? `<td rowspan="${items.length}" style="${TDcenter} vertical-align:middle;">${aspek}</td>` : ''}
          <td style="${TDcenter}">${globalRowNo++}</td>
          <td style="${TDstyle} font-size:10px;">${it.soal}</td>
          <td style="${TDcenter}">${score}</td>
          <td style="${TDcenter}">${nilaiPerPoin.toFixed(3)}</td>
          ${i === 0 ? `<td rowspan="${items.length}" style="${TDcenter} vertical-align:middle; background:#f1f3f5; font-weight:bold;">-</td>` : ''}
          ${aspIdx === 0 && i === 0 ? `<td rowspan="999" style="${TDcenter} vertical-align:middle; font-weight:bold;">-</td>` : ''}
        </tr>`;
      });

      // Summary row per aspek
      html += `<tr style="background:#f8f9fa; font-weight:bold;">
        <td colspan="5" style="${TDstyle} text-align:right; font-size:10px; padding:5px;">JUMLAH NILAI ASPEK ${aspek.toUpperCase()}</td>
        <td style="${TDcenter}">${aspectSum.toFixed(3)}</td>
      </tr>`;

      totalTK += aspectSum;
    });

    document.getElementById('det-tabel-body-full').innerHTML = html;

    // Now fix the rowspan cells manually
    const tbody = document.getElementById('det-tabel-body-full');
    const allRows = tbody.querySelectorAll('tr');
    let rowIdx = 0;
    aspekKeys.forEach((aspek) => {
      const items = r.filter(x => x.aspek === aspek);
      const firstRow = allRows[rowIdx];
      const aspSumCell = firstRow.querySelectorAll('td')[6]; // nilai per aspek col
      if (aspSumCell) {
        const sum = items.reduce((a, it) => a + parseFloat(it.nilai || 0), 0);
        aspSumCell.innerText = sum.toFixed(3);
      }
      rowIdx += (items.length + 1); // +1 for summary row
    });

    // Fix NILAI PER DIMENSI cell (first rowspan=999 cell)
    const dimCell = tbody.querySelector('td[rowspan="999"]');
    const tk50 = (totalTK * 0.5).toFixed(3);
    if (dimCell) dimCell.innerText = tk50;

    // Populate tfoot
    const skmRaw = parseFloat(d.nilaiSKM || 0);
    const skm50 = (skmRaw * 0.5).toFixed(3);

    document.getElementById('det-tk-raw').innerText = totalTK.toFixed(3);
    document.getElementById('det-tk-50').innerText = tk50;
    document.getElementById('det-skm-raw-1').innerText = skmRaw.toFixed(3);
    document.getElementById('det-skm-raw-2').innerText = skmRaw.toFixed(2);
    document.getElementById('det-skm-sum').innerText = skmRaw.toFixed(3);
    document.getElementById('det-skm-50').innerText = skm50;

    mDetail.show();
  }

  function toggleOpdInput() {
    const tipe = document.getElementById('set-tipe').value;
    const wrap = document.getElementById('set-opd-wrap');
    wrap.classList.toggle('hidden', tipe !== 'OPD');
  }

  function loadPengaturan() {
    // Isi dropdown OPD dari sheet Master_OPD
    google.script.run.withSuccessHandler(opdList => {
      const opts = opdList.map(nama => `<option value="${nama}">${nama}</option>`).join('');
      document.getElementById('set-opd-val').innerHTML = opts || '<option>Tidak ada OPD</option>';
    }).getListOPD();

    // Muat tabel pengaturan
    google.script.run.withSuccessHandler(rows => {
      const now = new Date();
      const tbody = document.getElementById('setting-body');
      if (!rows || rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">Belum ada pengaturan periode.</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(r => {
        const buka = r.tglBuka ? new Date(r.tglBuka) : null;
        const tutup = r.tglTutup ? new Date(r.tglTutup) : null;
        let statusBadge = '<span class="badge bg-secondary">Tidak Diketahui</span>';
        if (buka && tutup) {
          if (now < buka) statusBadge = '<span class="badge bg-warning text-dark">⏳ Belum Dibuka</span>';
          else if (now > tutup) statusBadge = '<span class="badge bg-danger">🔒 Sudah Tutup</span>';
          else statusBadge = '<span class="badge bg-success">✅ Sedang Buka</span>';
        }
        const fmtBuka = buka ? buka.toLocaleString('id-ID') : '-';
        const fmtTutup = tutup ? tutup.toLocaleString('id-ID') : '-';
        const label = r.tipe === 'GLOBAL' ? '🌐 GLOBAL (Semua OPD)' : `🏢 ${r.tipe}`;
        return `<tr>
          <td class="px-3 fw-bold">${label}</td>
          <td class="text-center text-success">${fmtBuka}</td>
          <td class="text-center text-danger">${fmtTutup}</td>
          <td class="text-center">${statusBadge}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-outline-danger" onclick="hapusPengaturan('${r.tipe}')">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>`;
      }).join('');
    }).getPengaturanPeriode();
  }

  function simpanPengaturan() {
    const tipeEl = document.getElementById('set-tipe').value;
    const tipe = tipeEl === 'OPD' ? document.getElementById('set-opd-val').value : 'GLOBAL';
    const tglBuka = document.getElementById('set-buka').value;
    const tglTutup = document.getElementById('set-tutup').value;

    if (!tglBuka || !tglTutup) {
      Swal.fire('Peringatan', 'Tanggal buka dan tutup harus diisi!', 'warning'); return;
    }
    if (new Date(tglTutup) <= new Date(tglBuka)) {
      Swal.fire('Peringatan', 'Tanggal tutup harus lebih besar dari tanggal buka!', 'warning'); return;
    }

    Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
    google.script.run
      .withSuccessHandler(res => {
        Swal.fire({ icon: 'success', title: 'Tersimpan!', text: res.pesan, timer: 2000, showConfirmButton: false });
        loadPengaturan();
      })
      .withFailureHandler(err => Swal.fire('Gagal', err.message, 'error'))
      .simpanPeriodePengisian({ tipe, tglBuka, tglTutup });
  }

  function hapusPengaturan(tipe) {
    Swal.fire({
      title: 'Konfirmasi Hapus',
      text: `Hapus pengaturan periode untuk "${tipe}"?`,
      icon: 'warning', showCancelButton: true,
      confirmButtonColor: '#d33', confirmButtonText: 'Ya, Hapus!'
    }).then(r => {
      if (r.isConfirmed) {
        google.script.run
          .withSuccessHandler(() => { Swal.fire('Terhapus!', '', 'success'); loadPengaturan(); })
          .withFailureHandler(err => Swal.fire('Gagal', err.message, 'error'))
          .hapusPeriodePengisian(tipe);
      }
    });
  }
